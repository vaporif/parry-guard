on:
  push:
    tags:
      - v[0-9]+.*

jobs:
  release:
    name: release ${{ matrix.target }} (${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - x86_64-apple-darwin
          - aarch64-apple-darwin
        backend:
          - candle
          - onnx-fetch
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - backend: onnx-fetch
            suffix: ""
          - backend: candle
            suffix: "candle-"
        exclude:
          - target: x86_64-unknown-linux-musl
            backend: onnx-fetch
          - target: aarch64-unknown-linux-musl
            backend: onnx-fetch
          - target: x86_64-apple-darwin
            backend: onnx-fetch
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - uses: cachix/cachix-action@v17
        with:
          name: parry-guard
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build binary
        run: |
          nix develop --command cargo build --release \
            --target ${{ matrix.target }} \
            --no-default-features --features ${{ matrix.backend }}

      - name: Package and upload
        run: |
          TAG=${{ github.ref_name }}
          ARCHIVE="parry-guard-${{ matrix.suffix }}${{ matrix.target }}-${TAG}"
          mkdir "${ARCHIVE}"
          cp "target/${{ matrix.target }}/release/parry-guard" README.md LICENSE "${ARCHIVE}/"
          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          sha256sum "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"
          gh release upload "${TAG}" "${ARCHIVE}.tar.gz" "${ARCHIVE}.tar.gz.sha256"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          publish-delay: 60000

  build-wheels:
    name: Build wheel ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            platform_tag: musllinux_1_2_x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            platform_tag: musllinux_1_2_aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            platform_tag: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            platform_tag: ""
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - uses: cachix/cachix-action@v17
        with:
          name: parry-guard
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build wheel
        run: |
          nix develop --command maturin build --release \
            --target ${{ matrix.target }} \
            --out dist

      - name: Fix platform tag
        if: ${{ matrix.platform_tag }}
        run: |
          import glob, os, re
          for whl in glob.glob("dist/*.whl"):
              new = re.sub(r"linux_[^.]+", "${{ matrix.platform_tag }}", whl)
              if new != whl:
                  os.rename(whl, new)
                  print(f"Renamed: {whl} -> {new}")
        shell: python

      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist
      - name: List wheels
        run: ls -la dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
