on:
  push:
    tags:
      - v[0-9]+.*

jobs:
  release-candle:
    name: release ${{ matrix.target }} (candle)
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: parry
          target: ${{ matrix.target }}
          build-tool: cargo
          features: candle
          no-default-features: true
          archive: $bin-candle-$target-$tag
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
          include: README.md,LICENSE

  release-onnx:
    name: release ${{ matrix.target }} (onnx-fetch)
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            dylib_ext: dylib
          - target: aarch64-apple-darwin
            os: macos-latest
            dylib_ext: dylib
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --no-default-features --features onnx-fetch --target ${{ matrix.target }}

      - name: Prepare archive
        id: prep
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          archive="parry-${{ matrix.target }}-${tag}"
          staging="${archive}"
          mkdir -p "${staging}"
          cp "target/${{ matrix.target }}/release/parry" "${staging}/"
          # Copy co-located ORT dylib
          find "target/${{ matrix.target }}/release" -maxdepth 1 -name "libonnxruntime*.${{ matrix.dylib_ext }}" -exec cp {} "${staging}/" \;
          cp README.md LICENSE "${staging}/"
          tar czf "${archive}.tar.gz" "${staging}"
          shasum -a 256 "${archive}.tar.gz" > "${archive}.tar.gz.sha256"
          echo "archive=${archive}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=${archive}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.prep.outputs.archive }}
            ${{ steps.prep.outputs.checksum }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [release-candle, release-onnx]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
